<!DOCTYPE html>
<html lang="en" class="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Oryn | Bespoke Digital Architecture. Select your archetype and build your digital presence." />
    <meta name="theme-color" content="#030303" />
    <title>Oryn | Digital Atelier</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;900&family=JetBrains+Mono:wght@200;300;400;500&family=Manrope:wght@200;300;400;500;600&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: {
              sans: ['var(--font-primary)', 'sans-serif'],
              serif: ['var(--font-secondary)', 'serif'],
              mono: ['var(--font-mono)', 'monospace'],
            },
            colors: {
              lux: {
                black: 'var(--color-bg)',      /* Dynamic Background */
                charcoal: 'var(--color-surface)', /* Dynamic Surface */
                surface: 'var(--color-surface-2)',
                gold: 'var(--color-accent)',   /* Dynamic Accent */
                white: 'var(--color-text)',    /* Dynamic Text */
                border: 'var(--color-border)', /* Dynamic Border */
              }
            },
            animation: {
              'glitch': 'glitch 0.2s linear infinite',
              'scanline': 'scanline 8s linear infinite',
              'float': 'float 20s ease-in-out infinite',
              'marquee': 'marquee 10s linear infinite',
              'matrix': 'matrix 2s linear infinite',
            },
            keyframes: {
              glitch: {
                '0%': { transform: 'translate(2px,0) skew(0deg)' },
                '20%': { transform: 'translate(-2px,0) skew(0deg)' },
                '40%': { transform: 'translate(0,0) skew(5deg)' },
                '60%': { transform: 'translate(0,0) skew(0deg)' },
                '80%': { transform: 'translate(2px,0) skew(0deg)' },
                '100%': { transform: 'translate(0,0) skew(0deg)' },
              },
              marquee: {
                '0%': { transform: 'translateX(0%)' },
                '100%': { transform: 'translateX(-100%)' },
              },
              float: {
                '0%, 100%': { transform: 'translateY(0)' },
                '50%': { transform: 'translateY(-20px)' },
              },
              matrix: {
                '0%': { opacity: '0', transform: 'translateY(-20px)' },
                '20%': { opacity: '1' },
                '100%': { opacity: '0', transform: 'translateY(20px)' }
              }
            }
          }
        }
      }
    </script>
    <style>
      :root {
        /* DEFAULT (LUXURY - ORYN) */
        --font-primary: 'Manrope';
        --font-secondary: 'Cormorant Garamond';
        --font-mono: 'JetBrains Mono';
        
        --color-bg: #030303;
        --color-surface: #0A0A0A;
        --color-surface-2: #121212;
        --color-accent: #E6D5B8; /* Champagne Gold */
        --color-text: #F5F5F0;   /* Off-white */
        --color-border: #222222;
      }
      
      body {
        background-color: var(--color-bg);
        color: var(--color-text);
        font-family: 'Manrope', sans-serif;
        /* Smooth transitions for color swaps */
        transition: background-color 0.4s ease-out, 
                    color 0.4s ease-out,
                    border-color 0.4s ease-out;
      }

      /* --- THEME OVERRIDES --- */

      /* MINIMAL - STARK WHITE & BLACK */
      .mode-minimal {
        --font-primary: 'Inter';
        --font-secondary: 'Inter'; 
        --font-mono: 'Inter';
        
        --color-bg: #FFFFFF;
        --color-surface: #F5F5F5;
        --color-surface-2: #EEEEEE;
        --color-accent: #000000;
        --color-text: #000000;
        --color-border: #E5E5E5;
      }
      .mode-minimal * {
        letter-spacing: -0.04em !important;
        border-radius: 0px !important;
        box-shadow: none !important;
      }

      /* BRUTAL - MATRIX / HACKER */
      .mode-brutal {
        --font-primary: 'JetBrains Mono';
        --font-secondary: 'JetBrains Mono';
        --font-mono: 'JetBrains Mono';
        
        --color-bg: #000000;
        --color-surface: #0a0a0a;
        --color-surface-2: #111111;
        --color-accent: #00FF41; /* Terminal Green */
        --color-text: #00FF41;   
        --color-border: #003300;
      }
      .mode-brutal * {
        text-transform: uppercase !important;
        letter-spacing: 0.05em !important;
        border-radius: 0px !important;
      }

      /* CUSTOM - BLUEPRINT */
      .mode-custom {
        --font-primary: 'Manrope';
        --font-secondary: 'JetBrains Mono';
        --font-mono: 'JetBrains Mono';
        
        --color-bg: #0a192f; /* Deep Navy/Royal Blue */
        --color-surface: #112240;
        --color-surface-2: #233554;
        --color-accent: #64ffda; /* Cyan */
        --color-text: #e6f1ff;   /* Pale Blue White */
        --color-border: #1d4ed8;
      }
      
      /* LUXURY (DEFAULT RESTORATION) */
      .mode-luxury {
        --font-primary: 'Manrope';
        --font-secondary: 'Cormorant Garamond';
        --font-mono: 'JetBrains Mono';
        
        --color-bg: #030303;
        --color-surface: #0A0A0A;
        --color-surface-2: #121212;
        --color-accent: #E6D5B8;
        --color-text: #F5F5F0;
        --color-border: #222222;
      }

      /* UTILS */
      .bg-noise-overlay {
        position: fixed;
        top: 0; left: 0; width: 100%; height: 100%;
        pointer-events: none; z-index: 9999;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.7' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.04'/%3E%3C/svg%3E");
        mix-blend-mode: overlay;
      }
      
      ::-webkit-scrollbar { width: 0px; background: transparent; }
      html { scroll-behavior: smooth; }
    </style>
  <script type="importmap">
{
  "imports": {
    "react-dom/": "https://aistudiocdn.com/react-dom@^19.2.0/",
    "react-markdown": "https://aistudiocdn.com/react-markdown@^10.1.0",
    "@google/genai": "https://aistudiocdn.com/@google/genai@^1.30.0",
    "lucide-react": "https://aistudiocdn.com/lucide-react@^0.555.0",
    "react/": "https://aistudiocdn.com/react@^19.2.0/",
    "react": "https://aistudiocdn.com/react@^19.2.0",
    "framer-motion": "https://aistudiocdn.com/framer-motion@^12.23.24",
    "recharts": "https://aistudiocdn.com/recharts@^3.5.0",
    "@supabase/supabase-js": "https://esm.sh/@supabase/supabase-js@2.39.7"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
  <body class="selection:bg-lux-gold selection:text-lux-black">
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
